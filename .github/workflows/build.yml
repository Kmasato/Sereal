name: Sereal Cross Platform Build

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    build:
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                os: [windows-latest, macos-latest]
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            # Rust toolchain のセットアップ (actions-rust-lang/setup-rust-toolchain を使用)
            - name: Install Rust toolchain
              uses: actions-rust-lang/setup-rust-toolchain@v1
              with:
                # Cargo の依存関係をキャッシュする
                cache: true

            - name: Build on Windows
              if: runner.os == 'Windows'
              run: cargo build --release --package Sereal

            - name: Build .app on macOS
              if: runner.os == 'macOS'
              run: |
                cargo install cargo-bundle
                cargo bundle --release --package Sereal

            - name: Upload Windows Artifact
              if: runner.os == 'Windows'
              uses: actions/upload-artifact@v4
              with:
                name: sereal-windows
                path: target/release/Sereal.exe

            - name: Upload macOS Artifact
              if: runner.os == 'macOS'
              uses: actions/upload-artifact@v4
              with:
                name: sereal-macos
                path: target/release/bundle/osx/Sereal.app


